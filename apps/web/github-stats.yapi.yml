yapi: v1
url: https://api.github.com/repos/jamierpond/yapi
method: GET
env_files:
  - .env.local
headers:
  Authorization: Bearer ${GITHUB_TOKEN}
  Accept: application/vnd.github.v3+json
  User-Agent: yapi-test

jq_filter: "{stars: .stargazers_count, forks: .forks_count, name: .full_name}"

expect:
  status: 200
  assert:
    body: # jq assertions
      - .stars > 0

