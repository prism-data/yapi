yapi: v1
# List contents of a GitHub directory
# Create .env.local in this directory with: GITHUB_TOKEN=your_token_here

env_files:
  - .env.local

url: https://api.github.com/repos/jamierpond/madea.blog/contents/yapi
method: GET

headers:
  Authorization: Bearer ${GITHUB_TOKEN}
  Accept: application/vnd.github.v3+json

expect:
  status: 200

jq_filter: '[.[] | {name, type, size}]'
