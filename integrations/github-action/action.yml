name: 'Yapi Action'
description: 'Run Yapi integration tests with background services'
author: 'jamierpond'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  start:
    description: 'Multiline string of commands to start in background (e.g., npm run dev)'
    required: false
    default: ''

  command:
    description: 'The yapi test command to execute. Use --wait-on for health checks.'
    required: false
    default: 'yapi test .'

  skip-install:
    description: 'Skip yapi installation and use pre-installed version (useful when building from source)'
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'
