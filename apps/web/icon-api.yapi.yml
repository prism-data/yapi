yapi: v1
chain:
  - name: icon_256
    path: /api/icon/256
    method: GET
    output_file: ./icons/icon-256.png
    expect:
      status: 200
      headers:
        content-type: image/png

  - name: icon_128
    path: /api/icon/128
    method: GET
    output_file: ./icons/icon-128.png
    expect:
      status: 200
      headers:
        content-type: image/png

  - name: icon_64
    path: /api/icon/64
    method: GET
    output_file: ./icons/icon-64.png
    expect:
      status: 200
      headers:
        content-type: image/png

  - name: icon_32
    path: /api/icon/32
    method: GET
    output_file: ./icons/icon-32.png
    expect:
      status: 200
      headers:
        content-type: image/png

  - name: icon_16
    path: /api/icon/16
    method: GET
    output_file: ./icons/icon-16.png
    expect:
      status: 200
      headers:
        content-type: image/png

  - name: icon_invalid
    path: /api/icon/999
    method: GET
    expect:
      status: 400
